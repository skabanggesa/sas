<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kehadiran Murid Cloud</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; text-align: center; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: white; border-radius: 12px; overflow: hidden; }
        .status-box { margin: 20px; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; min-height: 80px; }
        .success { background: #10b981; color: white; animation: pulse 0.5s; }
        .error { background: #ef4444; color: white; }
        .warning { background: #f59e0b; color: white; } /* Gaya untuk imbasan duplikat */
        .waiting { background: #334155; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .header { padding: 20px; background: #1e293b; margin-bottom: 0px; border-bottom: 1px solid #334155; }
        /* Banner untuk mengaktifkan suara pada browser */
        .audio-banner { background: #3b82f6; padding: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #1d4ed8; }
    </style>
</head>
<body>

<div id="audio-banner" class="audio-banner" onclick="unlockAudio()">
    🔊 KLIK DI SINI SEKALI SEBELUM MULA UNTUK AKTIFKAN BUNYI BEEP SCANNER
</div>

<div class="header">
    <h2 style="margin:0;">SISTEM KEHADIRAN MURID</h2>
    <p style="margin:5px 0 0; opacity:0.7; font-size:0.8rem;">Sesi Perekodan Kehadiran Sekolah (Real-Time)</p>
</div>

<div id="reader" style="margin-top: 20px;"></div>

<div id="status" class="status-box waiting">
    Sedia untuk imbasan QR kehadiran...
</div>

<audio id="beep" src="beep.mp3" preload="auto"></audio>

<script>
    // Konfigurasi Firebase 
    const firebaseConfig = {
        apiKey: "AIzaSyDNlFEnA9ZGLFTFCuwMK5ZMzv3D8Ww2BAo",
        authDomain: "smppro-2845e.firebaseapp.com",
        projectId: "smppro-2845e",
        storageBucket: "smppro-2845e.firebasestorage.app",
        messagingSenderId: "488762363336",
        appId: "1:488762363336:web:da4ccbb41c1236eaf184fd",
        measurementId: "G-NZR5BXZKR1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lastScanned = "";
    let isProcessing = false;

    // Fungsi Khas: Membuka sekatan audio pada peranti/browser
    function unlockAudio() {
        const beep = document.getElementById('beep');
        beep.play().then(() => {
            beep.pause();
            beep.currentTime = 0;
            document.getElementById('audio-banner').style.display = 'none'; // Sorok banner selepas diaktifkan
        }).catch(err => {
            console.error("Gagal mengaktifkan audio:", err);
        });
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing || decodedText === lastScanned) return;
        
        isProcessing = true;
        const scannedText = decodedText.trim().toUpperCase(); 
        const statusDiv = document.getElementById('status');
        
        try {
            let studentData = null;
            let studentId = "";

            // LANGKAH 1: Cuba cari jika teks QR ialah ID/IC Murid
            const docRef = db.collection("students").doc(scannedText);
            const docSnap = await docRef.get();
            
            if (docSnap.exists) {
                studentData = docSnap.data();
                studentId = scannedText;
            } else {
                // LANGKAH 2: Cuba cari jika teks QR ialah NAMA MURID
                const q = await db.collection("students").where("name", "==", scannedText).get();
                if (!q.empty) {
                    studentData = q.docs[0].data();
                    studentId = studentData.id || q.docs[0].id;
                }
            }
            
            // JIKA MURID DIJUMPAI
            if (studentData) {
                const hariIni = new Date().toLocaleDateString('en-GB'); // Format tarikh semasa: DD/MM/YYYY

                // KEMAS KINI 2: Semak rekod sama ada murid telah melakukan scan pada hari ini
                const logSemak = await db.collection("logs")
                    .where("id", "==", studentId)
                    .where("date", "==", hariIni)
                    .get();

                if (!logSemak.empty) {
                    statusDiv.innerHTML = `⚠️ SUDAH HADIR!<br>${studentData.name}<br>Kehadiran murid ini telah direkodkan hari ini.`;
                    statusDiv.className = "status-box warning";
                    lastScanned = decodedText;
                    
                    setTimeout(() => { 
                        statusDiv.className = "status-box waiting"; 
                        statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                        isProcessing = false;
                        lastScanned = "";
                    }, 3000);
                    return; // Menyekat log baharu daripada disimpan semula
                }

                // Mainkan bunyi Beep selepas kebenaran browser diberikan
                try {
                    document.getElementById('beep').play();
                } catch(e) {
                    console.log("Audio disekat browser. Sila klik banner atas terlebih dahulu.");
                }
                
                // Simpan log kehadiran unik ke koleksi "logs"
                await db.collection("logs").add({
                    id: studentId,
                    name: studentData.name,
                    class: studentData.class,
                    date: hariIni,
                    time: new Date().toLocaleTimeString('en-GB', {hour12: false}), // Format: HH:MM:SS
                    status: "HADIR",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                statusDiv.innerHTML = `✅ KEHADIRAN DIREKOD!<br>${studentData.name}<br>(${studentData.class})`;
                statusDiv.className = "status-box success";
                lastScanned = decodedText;
                
                setTimeout(() => { 
                    statusDiv.className = "status-box waiting"; 
                    statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                    isProcessing = false;
                    lastScanned = "";
                }, 3000);

            } else {
                // JIKA MEMANG TIADA DALAM DATABASE
                statusDiv.innerHTML = `❌ GAGAL DETECT!<br>Data (${scannedText}) tiada dalam sistem Cloud.`;
                statusDiv.className = "status-box error";
                setTimeout(() => { 
                    statusDiv.className = "status-box waiting"; 
                    statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                    isProcessing = false;
                }, 3000);
            }
        } catch (err) {
            console.error("Ralat Firebase:", err);
            statusDiv.innerHTML = `❌ REKOD GAGAL!<br>${err.message}`;
            statusDiv.className = "status-box error";
            setTimeout(() => { 
                statusDiv.className = "status-box waiting"; 
                statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                isProcessing = false;
            }, 5000);
        }
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
