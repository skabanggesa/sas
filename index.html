<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kehadiran Murid Cloud</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; text-align: center; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: white; border-radius: 12px; overflow: hidden; }
        .status-box { margin: 20px; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; min-height: 80px; }
        .success { background: #10b981; color: white; animation: pulse 0.5s; }
        .error { background: #ef4444; color: white; }
        .waiting { background: #334155; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .header { padding: 20px; background: #1e293b; margin-bottom: 20px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">SISTEM KEHADIRAN MURID</h2>
    <p style="margin:5px 0 0; opacity:0.7; font-size:0.8rem;">Sesi Perekodan Kehadiran Sekolah (Real-Time)</p>
</div>

<div id="reader"></div>

<div id="status" class="status-box waiting">
    Sedia untuk imbasan QR kehadiran...
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
    // Konfigurasi Firebase anda kekal sama
    const firebaseConfig = {
        apiKey: "AIzaSyDNlFEnA9ZGLFTFCuwMK5ZMzv3D8Ww2BAo",
        authDomain: "smppro-2845e.firebaseapp.com",
        projectId: "smppro-2845e",
        storageBucket: "smppro-2845e.firebasestorage.app",
        messagingSenderId: "488762363336",
        appId: "1:488762363336:web:da4ccbb41c1236eaf184fd",
        measurementId: "G-NZR5BXZKR1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lastScanned = "";
    let isProcessing = false;

async function onScanSuccess(decodedText) {
        if (isProcessing || decodedText === lastScanned) return;
        
        isProcessing = true;
        const scannedText = decodedText.trim().toUpperCase(); // Bersihkan teks QR
        const statusDiv = document.getElementById('status');
        
        try {
            let studentData = null;
            let studentId = "";

            // LANGKAH 1: Cuba cari jika teks QR ialah ID/IC Murid (ID Dokumen)
            const docRef = db.collection("students").doc(scannedText);
            const docSnap = await docRef.get();
            
            if (docSnap.exists) {
                studentData = docSnap.data();
                studentId = scannedText;
            } else {
                // LANGKAH 2: Jika tak jumpa, cuba cari jika teks QR ialah NAMA MURID
                const q = await db.collection("students").where("name", "==", scannedText).get();
                if (!q.empty) {
                    studentData = q.docs[0].data();
                    studentId = studentData.id; // Ambil ID unik murid dari database
                }
            }
            
            // JIKA MURID DIJUMPAI (Sama ada melalui ID atau Nama)
            if (studentData) {
                // Bunyi Beep Kehadiran
                try {
                    document.getElementById('beep').play();
                } catch(e) {
                    console.log("Audio disekat oleh pelayar web.");
                }
                
                // Simpan log kehadiran ke koleksi "logs"
                await db.collection("logs").add({
                    id: studentId,
                    name: studentData.name,
                    class: studentData.class,
                    date: new Date().toLocaleDateString('en-GB'), // Format: DD/MM/YYYY
                    time: new Date().toLocaleTimeString('en-GB', {hour12: false}), // Format: HH:MM:SS
                    status: "HADIR",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                statusDiv.innerHTML = `✅ KEHADIRAN DIREKOD!<br>${studentData.name}<br>(${studentData.class})`;
                statusDiv.className = "status-box success";
                lastScanned = decodedText;
                
                // Reset kawalan imbasan selepas 3 saat
                setTimeout(() => { 
                    statusDiv.className = "status-box waiting"; 
                    statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                    isProcessing = false;
                    lastScanned = "";
                }, 3000);

            } else {
                // JIKA MEMANG TIADA DALAM DATABASE
                statusDiv.innerHTML = `❌ GAGAL DETECT!<br>Data (${scannedText}) tiada dalam sistem Cloud.`;
                statusDiv.className = "status-box error";
                setTimeout(() => { 
                    statusDiv.className = "status-box waiting"; 
                    statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                    isProcessing = false;
                }, 3000);
            }
        } catch (err) {
            console.error("Ralat Firebase:", err);
            statusDiv.innerHTML = `❌ REKOD GAGAL!<br>${err.message}`;
            statusDiv.className = "status-box error";
            setTimeout(() => { 
                statusDiv.className = "status-box waiting"; 
                statusDiv.innerHTML = "Sedia untuk imbasan QR kehadiran...";
                isProcessing = false;
            }, 5000);
        }
    }

    // Pastikan dua baris ini kekal ada di bawah untuk aktifkan kamera
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
